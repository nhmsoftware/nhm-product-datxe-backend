# =============================================================================
# docker-compose.yml — Local development
#
# Cách dùng:
#   docker compose up -d
#   docker compose logs -f app
#
# Dừng an toàn (giữ DB):   docker compose down
# Xoá sạch hoàn toàn:      docker compose down && rm -rf ./data
# =============================================================================

services:

  app:
    build: .
    container_name: nhm-app
    restart: unless-stopped
    volumes:
      - .:/var/www                      # source code từ host → hot-reload
      - vendor:/var/www/vendor          # vendor tách riêng, không bị override
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: nhm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       nhm_datxe
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: 123456
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nhm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  vendor:
  postgres_data:  # ✅
