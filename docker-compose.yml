# =============================================================================
# docker-compose.yml — Local development (FULL STACK)
#
# Cách dùng:
#   docker compose up -d --build
#   docker compose logs -f realtime   (Xem log của Node.js)
#   docker compose logs -f app        (Xem log của Laravel)
# =============================================================================

services:

  # 1. Dịch vụ Backend (Laravel)
  app:
    build: .
    container_name: nhm-app-local
    restart: unless-stopped
    volumes:
      - .:/var/www                      
      - vendor:/var/www/vendor          
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 2. Dịch vụ Realtime (Node.js) - THÊM VÀO ĐỂ TEST LOCAL
  realtime:
    build:
      context: ../nhm-product-datxe-realtime
      dockerfile: Dockerfile
    container_name: nhm-realtime-local
    restart: unless-stopped
    volumes:
      - ../nhm-product-datxe-realtime:/app
      - /app/node_modules
    ports:
      - "8002:3001"
    env_file: ../nhm-product-datxe-realtime/.env
    environment:
      REDIS_HOST: redis     # Cùng mạng Docker nên gọi tên service là 'redis'
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy

  # 3. Cơ sở dữ liệu PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: nhm-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB:       nhm_datxe
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: 123456
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 4. Redis Server
  redis:
    image: redis:7-alpine
    container_name: nhm-redis-local
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  vendor:
  postgres_data:
